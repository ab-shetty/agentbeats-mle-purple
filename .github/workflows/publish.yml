# Builds the MLE-Bench purple agent image and pushes it to GHCR.
#
# Triggers:
#   - push to main         → tags :latest and :sha-<shortsha>
#   - push of a tag v*     → tags :<tag> and :latest
#   - manual dispatch      → tags :sha-<shortsha>
#
# Image:  ghcr.io/<owner>/<repo>
# (For this project that is ghcr.io/abhishek1shetty/agentbeats-mle-purple
#  — owner+repo are lowercased automatically by the workflow.)
#
# After the first successful run, go to the new GitHub package's settings
# page and flip its visibility to "Public" so the AgentBeats runner can
# pull it without auth.
#
# The job summary prints the pinned digest reference
# (ghcr.io/<owner>/<repo>@sha256:...) — paste that into amber-manifest.json5.

name: Build and publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase owner/repo)
        id: image
        run: |
          owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          repo_lc=$(basename '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner_lc}/${repo_lc}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata / tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha,prefix=sha-

      - name: Build and push (linux/amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write pinned digest to job summary
        run: |
          digest='${{ steps.build.outputs.digest }}'
          image='${{ steps.image.outputs.name }}'
          {
            echo "### Image published"
            echo
            echo '**Pinned reference (paste this into `amber-manifest.json5`):**'
            echo
            echo '```'
            echo "${image}@${digest}"
            echo '```'
            echo
            echo "Tags: ${{ steps.meta.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"
